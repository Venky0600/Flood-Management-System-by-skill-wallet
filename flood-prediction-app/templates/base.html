<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Rising Waters — An AI-powered flood prediction and early warning system using Machine Learning to protect communities.">
  <meta name="theme-color" content="#040f2d">
  <title>{% block title %}Rising Waters — Flood Prediction System{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <!-- ── Navigation ── -->
  <nav id="main-nav">
    <a href="{{ url_for('home') }}" class="brand" aria-label="Rising Waters Home">
      <span class="wave-icon">🌊</span>
      <span>Rising Waters</span>
    </a>

    <a href="{{ url_for('home') }}"
       id="nav-home"
       class="{{ 'active' if request.path == '/' else '' }}">
      🏠 Dashboard
    </a>

    <a href="{{ url_for('predict') }}"
       id="nav-predict"
       class="{{ 'active' if request.path == '/predict' else '' }}">
      🔍 Predict
    </a>

    <a href="{{ url_for('history') }}"
       id="nav-history"
       class="{{ 'active' if request.path == '/history' else '' }}">
      📋 History
    </a>

    <a href="{{ url_for('about') }}"
       id="nav-about"
       class="{{ 'active' if request.path == '/about' else '' }}">
      ℹ️ About
    </a>
  </nav>

  <!-- ── Main Content ── -->
  <main>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <!-- ── Footer ── -->
  <footer>
    <div class="footer-brand">🌊 RISING WATERS</div>
    <div class="footer-sub">
      A Machine Learning Approach to Flood Prediction &nbsp;|&nbsp;
      Powered by Random Forest &amp; XGBoost &nbsp;|&nbsp;
      Early Warning System for Disaster Management
    </div>
  </footer>

  <script>
    // Animate stat numbers on scroll
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(el => {
        if (el.isIntersecting) el.target.style.animationPlayState = 'running';
      });
    }, { threshold: 0.2 });
    document.querySelectorAll('.stat-card, .bar-fill').forEach(el => {
      el.style.animationPlayState = 'paused';
      observer.observe(el);
    });
  </script>
</body>
</html>
